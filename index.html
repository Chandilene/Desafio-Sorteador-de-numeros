<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorteador de números</title>
    <link rel="stylesheet" href="styles/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1>Sorteador de números</h1>
    <h2>Quero sortear:</h2>
    <p>
      Defina o intervalo e a quantidade de números, clique em "Sortear" e veja
      os resultados na tela. É rápido e fácil!
    </p>

    <form action="">
      <label for="number">Números</label>
      <input type="number" name="number" id="number" />

      <label for="from">De</label>
      <input type="number" name="from" id="from" />

      <label for="to">Até</label>
      <input type="number" name="to" id="to" />

      <input
        type="checkbox"
        name="noRepeatPermission"
        id="noRepeatPermission"
      />
      <label for="noRepeatPermission">Não repetir número</label>
    </form>
    <button id="draw">SORTEAR</button>
    <div class="showResult"></div>

    <script src="script.js"></script>
  </body>
</html>
